# Profile for environments where Redis is deployed and is the active rate-limit
# backend. Activate with SPRING_PROFILES_ACTIVE=redis.
rate-limit.backend=redis

# Redis is now a real dependency for rate limiting, so let its health surface in
# readiness. The ResilientRateLimitBackend still degrades to in-memory limiting
# at request time if Redis goes down, so this only affects observability.
management.health.redis.enabled=true