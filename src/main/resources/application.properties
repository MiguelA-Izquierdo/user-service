
spring.datasource.url=${DB_URL}?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.jpa.show-sql=false
spring.application.name=app_user_service
server.port=8080


jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.base-url=${APP_BASE_URL:http://localhost:8080}

spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=/
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.template.mandatory=true

rabbitmq.retry.maxAttempts=5
rabbitmq.retry.initialInterval=1000
rabbitmq.retry.maxInterval=30000
rabbitmq.retry.multiplier=2.0

# Outbox publisher: poll interval, batch size per poll, retry budget and backoff base.
# Backoff is exponential: base * 2^(attempt-1). After max-attempts the event is parked as DEAD.
outbox.publisher.poll-interval-ms=${OUTBOX_POLL_INTERVAL_MS:5000}
outbox.publisher.batch-size=${OUTBOX_BATCH_SIZE:100}
outbox.publisher.max-attempts=${OUTBOX_MAX_ATTEMPTS:5}
outbox.publisher.backoff-seconds=${OUTBOX_BACKOFF_SECONDS:10}

# Messaging topology
messaging.exchange.user=userExchange
messaging.exchange.dlx=user.dlx

messaging.queue.userCreated=userCreatedQueue
messaging.queue.userUpdated=userUpdatedQueue
messaging.queue.userDeleted=userDeletedQueue
messaging.queue.userLocked=userLockedQueue
messaging.queue.userUnlocked=userUnlockedQueue
messaging.queue.userLogged=userLoggedQueue

messaging.queue.userCreated.dlq=userCreatedQueue.dlq
messaging.queue.userUpdated.dlq=userUpdatedQueue.dlq
messaging.queue.userDeleted.dlq=userDeletedQueue.dlq
messaging.queue.userLocked.dlq=userLockedQueue.dlq
messaging.queue.userUnlocked.dlq=userUnlockedQueue.dlq
messaging.queue.userLogged.dlq=userLoggedQueue.dlq

messaging.routing.key.userCreated=user.created
messaging.routing.key.userUpdated=user.updated
messaging.routing.key.userDeleted=user.deleted
messaging.routing.key.userLocked=user.locked
messaging.routing.key.userUnlocked=user.unlocked
messaging.routing.key.userLogged=user.logged.#
messaging.routing.key.userLogged.with.token=user.logged.with.token
messaging.routing.key.userLogged.without.token=user.logged.without.token
messaging.routing.key.userLogged.logout=user.logged.logout



security.hsts.enabled=${SECURITY_HSTS_ENABLED:false}

# Rate limiting  (memory = single-instance Caffeine+Bucket4j | redis = distributed)
rate-limit.backend=${RATE_LIMIT_BACKEND:memory}
rate-limit.trust-proxy=${RATE_LIMIT_TRUST_PROXY:false}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Actuator runs on a separate, internal-only management port so it can be
# network-isolated in production (never routed by the public Ingress). The main
# JWT SecurityFilterChain is bound to the application port, not this one.
# Override MANAGEMENT_PORT per environment; locally Actuator lives at :8081.
management.server.port=${MANAGEMENT_PORT:8081}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=SUPER_ADMIN
# Redis is an optional dependency (rate limiting). Don't let its absence flip
# readiness to DOWN in environments that run the in-memory backend.
# Override to true only where Redis is the active backend (see application-redis.properties).
management.health.redis.enabled=${RATE_LIMIT_REDIS_HEALTH:false}

logging.level.org.springframework=ERROR
logging.level.org.apache.catalina=ERROR
logging.level.org.springframework.boot=ERROR
logging.level.org.hibernate=warn
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=warn
logging.level.com.zaxxer.hikari=ERROR
logging.level.root=ERROR
logging.level.com.app=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.data=ERROR

logging.level.com.app.userService.user.infrastructure.messaging.outbound.UserEventRabbitPublisher=${LOG_LEVEL_MESSAGING:INFO}
logging.level.com.app.userService.user.infrastructure.messaging.outbound.OutboxEventPublisher=${LOG_LEVEL_MESSAGING:INFO}

